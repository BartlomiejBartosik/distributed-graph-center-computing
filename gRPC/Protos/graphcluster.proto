syntax = "proto3";

option csharp_namespace = "PSR_GraphCenter.Contracts";

package graphcluster;

service ClusterCoordinator {
  rpc Connect(stream WorkerMessage) returns (stream ServerMessage);
}

message WorkerHello {
  string worker_id = 1;
  int32 preferred_threads = 2;
}

message Heartbeat {
  string worker_id = 1;
  string job_id = 2;
  string chunk_id = 3;
  int64 unix_time_ms = 4;
}

message VertexSum {
  int32 vertex = 1;
  double sum = 2;
}

message ChunkResult {
  string worker_id = 1;
  string job_id = 2;
  string chunk_id = 3;
  string lease_id = 4;
  repeated VertexSum sums = 5;
  int64 execution_time_ms = 6;
}

message WorkerMessage {
  oneof payload {
    WorkerHello hello = 1;
    Heartbeat heartbeat = 2;
    ChunkResult result = 3;
  }
}

message NodeDto {
  int32 id = 1;
  double x = 2;
  double y = 3;
}

message EdgeDto {
  int32 source = 1;
  int32 target = 2;
}

message GraphDto {
  int32 vertex_count = 1;
  repeated NodeDto nodes = 2;
  repeated EdgeDto edges = 3;
}

message ChunkTask {
  string job_id = 1;
  string chunk_id = 2;
  string lease_id = 3;
  int32 start_vertex_inclusive = 4;
  int32 end_vertex_exclusive = 5;
  int32 local_thread_count = 6;
  GraphDto graph = 7;
}

message ServerMessage {
  oneof payload {
    ChunkTask task = 1;
  }
}